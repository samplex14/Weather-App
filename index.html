<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get real-time weather information and 5-day forecasts for any city worldwide">
  <title>Weather App - Real-time Weather Forecasts</title>
  <link rel="stylesheet" href="style.css">

  <!-- ✅ Proper Material Symbols import -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>
  <div class="main-container">
    <header class="input-container">
      <input
        type="text"
        class="city-input"
        placeholder="Search City"
        aria-label="Search for a city"
        autocomplete="off"
      >
      <button
        class="location-btn"
        title="Use My Location"
        aria-label="Use my current location"
      >
        <span class="material-symbols-outlined" aria-hidden="true">my_location</span>
      </button>
      <button
        class="search-btn"
        aria-label="Search for weather"
      >
        <span class="material-symbols-outlined" aria-hidden="true">search</span>
      </button>
    </header>

    <div class="weather-info" style="display: none;" role="main" aria-live="polite">
      <div class="location-date-container">
        <div class="location">
          <span class="material-symbols-outlined" aria-hidden="true">location_on</span>
          <h4 class="country-txt">India</h4>
        </div>
        <h5 class="current-date-txt regular-txt">
            Thu, 30 Oct 2025
        </h5>
      </div>
      <div class="weather-summary-container">
        <img src="assets/weather/clouds.svg" class="weather-summary-img" alt="Weather condition icon">
        <div class="weather-summary-info">
          <h1 class="temp-text">29 °C</h1>
          <h3 class="condition-txt regular-txt">Clouds</h3>
        </div>
      </div>
      <div class="weather-conditions-container">
        <div class="condition-item">
          <span class="material-symbols-outlined" aria-hidden="true">water_drop</span>
          <div class="condition-info">
            <h5 class="regular-txt">Humidity</h5>
            <h5 class="humidity-value">55%</h5>
          </div>
        </div>
        <div class="condition-item">
          <span class="material-symbols-outlined" aria-hidden="true">airwave</span>
          <div class="condition-info">
          <h5 class="regular-txt">Wind Speed</h5>
          <h5 class="wind-value-txt">2 M/s</h5>
         </div>
        </div>
      </div>
      <div class="forecast-item-container" role="list" aria-label="5-day weather forecast">
        <div class="forecast-item" role="listitem">
          <h5 class="forecast-item-date regular-txt">30,Oct</h5>
          <img src="assets/weather/thunderstorm.svg" class="forecast-item-img" alt="Thunderstorm">
          <h5 class="forecast-item-temp">29 °C</h5>
        </div>
          <div class="forecast-item" role="listitem">
          <h5 class="forecast-item-date regular-txt">30,Oct</h5>
          <img src="assets/weather/thunderstorm.svg" class="forecast-item-img" alt="Thunderstorm">
          <h5 class="forecast-item-temp">29 °C</h5>
        </div>
         <div class="forecast-item" role="listitem">
          <h5 class="forecast-item-date regular-txt">30,Oct</h5>
          <img src="assets/weather/thunderstorm.svg" class="forecast-item-img" alt="Thunderstorm">
          <h5 class="forecast-item-temp">29 °C</h5>
        </div>
         <div class="forecast-item" role="listitem">
          <h5 class="forecast-item-date regular-txt">30,Oct</h5>
          <img src="assets/weather/thunderstorm.svg" class="forecast-item-img" alt="Thunderstorm">
          <h5 class="forecast-item-temp">29 °C</h5>
        </div>
      </div>
    </div>

    <section class="search-city section-message" role="status">
      <img src="assets/message/search-city.png" alt="Search city illustration">
       <div>
        <h1>Search City</h1>
        <h4 class="regular-txt">
          Find out the weather conditions of the city
        </h4>

       </div>
    </section>
      <section class="not-found section-message" style="display: none;" role="alert">
      <img src="assets/message/not-found.png" alt="City not found illustration">
       <div>
        <h1>City Not Found</h1>
        <h4 class="regular-txt">
          Please check the city name and try again
        </h4>

       </div>
    </section>
  </div>
</body>
 <script src="script.js"></script>
</html>
